# Raseed production PostgreSQL host access policy.
#
# Keep local socket access simple for container-internal maintenance tasks,
# and allow TCP connections from Docker bridge networks so the backend can
# reach Postgres through the compose service name.
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             172.16.0.0/12           scram-sha-256
