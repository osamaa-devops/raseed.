services:
  postgres:
    image: postgres:16-alpine
    container_name: raseed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raseed
      POSTGRES_PASSWORD: raseed_password
      POSTGRES_DB: raseed_dev
    ports:
      - "5432:5432"
    volumes:
      - raseed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raseed -d raseed_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: raseed-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@raseed.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  raseed_postgres_data:
