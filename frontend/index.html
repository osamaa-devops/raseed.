
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raseed — رصيد</title>
    <link rel="icon" type="image/svg+xml" href="/raseed-logo.svg" />
    <meta
      name="description"
      content="رصيد هو نظام POS عربي لإدارة المبيعات والمخزون والفواتير للمحلات والسوبر ماركت."
    />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #root {
        height: 100%;
      }
    </style>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("raseed-theme");
          var legacyDark = localStorage.getItem("raseed-dark-mode");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var shouldUseDark = theme === "dark" || (!theme && legacyDark === "true") || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", shouldUseDark);
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
